{% extends "base.html" %}
{% block title %}Forgot Password - IAM System{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-4">
        <div class="card shadow">
            <div class="card-header bg-primary text-white text-center">
                <h4><i class="bi bi-envelope"></i> Forgot Password</h4>
            </div>
            <div class="card-body">

               
                <form method="POST">
                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" class="form-control" id="email" name="email" placeholder="Enter your email" required>
                    </div>

                    <button type="submit" class="btn btn-primary w-100">Send Reset Link</button>
                </form>

                <hr>
                <a class="btn btn-outline-secondary w-100" href="{{ url_for('auth.recover_with_security_question') }}">
                    Recover With Security Question
                </a>

                <hr>
                <div class="text-center">
                    <a href="{{ url_for('auth.login') }}">Back to Login</a>
                </div>

            </div>
        </div>
    </div>
</div>
{% endblock %}

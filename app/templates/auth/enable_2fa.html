{% extends "base.html" %}
{% block title %}Enable Two-Factor Authentication{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-body text-center">
                <h3 class="card-title mb-3">Enable Two-Factor Authentication (2FA)</h3>
                <p>Scan this QR Code in your Google Authenticator or Authy app:</p>
                <img src="{{ url_for('auth.qrcode_image') }}" alt="QR Code" class="img-fluid mb-3">

                <p>Or enter this code manually in your app: <strong>{{ secret }}</strong></p>

                <form method="POST">
                    <div class="mb-3">
                        <label for="code" class="form-label">Enter 6-digit code from your app:</label>
                        <input type="text" name="code" id="code" class="form-control" placeholder="123456" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Enable 2FA</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
